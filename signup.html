  <div class="container">
    <div class="row">
      <div class="col-lg-12">
        <div class="page-content">

          <!-- ***** Sign Up Form Start ***** -->
          <div class="row">
            <div class="col-lg-6 offset-lg-3">
              <div class="signup-form-container">
                <div class="heading-section text-center">
                  <h4><em>Create</em> Your Account</h4>
                  <p>Join the Cyborg Gaming community and start your adventure today.</p>
                </div>
                <form id="signup-form" action="#" method="post">
                  <div class="signup-form-group">
                    <label for="username">Username</label>
                    <div class="input-icon">
                      <i class="fa fa-user"></i>
                      <input type="text" id="username" name="username" placeholder="Choose a username" required>
                    </div>
                  </div>
                  <div class="signup-form-group">
                    <label for="email">Email Address</label>
                    <div class="input-icon">
                      <i class="fa fa-envelope"></i>
                      <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                  </div>
                  <div class="signup-form-group">
                    <label for="password">Password</label>
                    <div class="input-icon">
                      <i class="fa fa-lock"></i>
                      <input type="password" id="password" name="password" placeholder="Create a password" required>
                    </div>
                  </div>
                  <div class="signup-form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="input-icon">
                      <i class="fa fa-lock"></i>
                      <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required>
                    </div>
                  </div>
                  <div class="signup-form-group checkbox-group">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
                  </div>
                  <div class="signup-form-group text-center">
                    <div class="main-button">
                      <button type="submit">Sign Up</button>
                    </div>
                  </div>
                  <div class="signup-form-footer text-center">
                    <p>Already have an account? <a href="#">Log In</a></p>
                  </div>
                </form>
              </div>
            </div>
          </div>
          <!-- ***** Sign Up Form End ***** -->

        </div>
      </div>
    </div>
  </div>
